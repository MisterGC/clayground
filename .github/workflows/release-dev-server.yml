name: Release Dev Server

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Inject version and build wheel
        working-directory: tools/clay-dev-server
        run: |
          VERSION=$(cat ../../VERSION)
          sed -i "s/^version = \"0.0.0\"/version = \"${VERSION}\"/" pyproject.toml
          pip install build
          python -m build --wheel

      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            tools/clay-dev-server/dist/*.whl
