<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  <link href="{{ site.baseurl }}/_pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="{{ site.baseurl }}/_pagefind/pagefind-ui.js"></script>
</head>
<body class="docs-page api-viewer-page">
  {%- include header.html -%}

  <div class="docs-layout">
    {%- include docs_sidebar.html -%}

    <main class="docs-content api-frame-container">
      <iframe id="api-frame" class="api-frame"></iframe>
    </main>
  </div>

  {%- include footer.html -%}

  <script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var page = params.get('type');
    var frame = document.getElementById('api-frame');
    if (page && frame) {
      frame.src = '{{ site.baseurl }}/api/' + page;
    }
  })();
  </script>
</body>
</html>
